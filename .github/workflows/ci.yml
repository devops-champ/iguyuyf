name: CI/CD

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish Docker image?"
        required: true
        default: "false"

jobs:

  # ==========================
  # SET VERSION
  # ==========================

  setversion:
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Read and Bump Version
        id: bump
        run: |
          VERSION=$(mvn help:evaluate \
            -Dexpression=project.version \
            -q \
            -DforceStdout)

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          mvn versions:set \
            -DnewVersion=${NEW_VERSION} \
            -DgenerateBackupPoms=false

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Upload Updated Pom
        uses: actions/upload-artifact@v5
        with:
          name: updated-pom
          path: pom.xml

  # ==========================
  # BUILD
  # ==========================

  build:
    runs-on: ubuntu-latest
    needs: setversion

    steps:
      - uses: actions/checkout@v5

      - name: Download Updated Pom
        uses: actions/download-artifact@v5
        with:
          name: updated-pom

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean verify

      - name: Upload Jar
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar

  # ==========================
  # SONAR
  # ==========================

  sonar:
    runs-on: ubuntu-latest
    needs:
      - setversion
      - build

    steps:
      - uses: actions/checkout@v5

      - name: Download Updated Pom
        uses: actions/download-artifact@v5
        with:
          name: updated-pom

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Verify Sonar Token
        env:
          SONAR_TOKEN: ${{ secrets.GIT_SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing"
            exit 1
          fi

      - name: Create Sonar Project If Missing
        env:
          SONAR_TOKEN: ${{ secrets.GIT_SONAR_TOKEN }}
        run: |
          PROJECT_KEY="devops-champ_${{ github.event.repository.name }}"
      
          curl -u "${SONAR_TOKEN}:" \
            -X POST \
            "https://sonarcloud.io/api/projects/create" \
            -d "organization=devops-champ" \
            -d "project=${PROJECT_KEY}" \
            -d "name=${PROJECT_KEY}"
        continue-on-error: true
      
      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.GIT_SONAR_TOKEN }}
        run: |
          PROJECT_KEY="devops-champ_${{ github.event.repository.name }}"

          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${PROJECT_KEY} \
            -Dsonar.organization=devops-champ \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

  # ==========================
  # DOCKER BUILD
  # ==========================

  docker:
    runs-on: ubuntu-latest

    needs:
      - setversion
      - build
      - sonar

    if: inputs.publish == 'true'

    env:
      VERSION: ${{ needs.setversion.outputs.new_version }}

    steps:
      - uses: actions/checkout@v5

      - name: Download Jar
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - name: Build Docker Image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME_1 }}/${{ github.event.repository.name }}

          docker build \
            -t $IMAGE:${VERSION} \
            -t $IMAGE:latest .

      - name: Verify Docker Images
        run: |
          docker images

      - name: Save Docker Image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME_1 }}/${{ github.event.repository.name }}

          docker save \
            -o image.tar \
            $IMAGE:${VERSION} \
            $IMAGE:latest

      - name: Verify Saved Image
        run: |
          ls -lh image.tar

      - name: Upload Docker Image
        uses: actions/upload-artifact@v5
        with:
          name: docker-image
          path: image.tar

  # ==========================
  # DEPLOY
  # ==========================

  deploy:
    runs-on: ubuntu-latest

    needs:
      - setversion
      - docker

    if: inputs.publish == 'true'

    env:
      VERSION: ${{ needs.setversion.outputs.new_version }}

    steps:
      - uses: actions/checkout@v5

      - name: Download Docker Image
        uses: actions/download-artifact@v5
        with:
          name: docker-image

      - name: Load Docker Image
        run: |
          docker load -i image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_1 }}
          password: ${{ secrets.DOCKERHUB_TOKEN_1 }}

      - name: Verify Docker Images
        run: |
          docker images

      - name: Push Docker Image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME_1 }}/${{ github.event.repository.name }}

          docker push $IMAGE:${VERSION}
          docker push $IMAGE:latest
